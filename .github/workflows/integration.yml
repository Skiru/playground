name: Integration

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Start stack
        run: docker compose --env-file .env.example -f compose.yaml -f compose.dev.yaml up --build --wait -d database api worker web
      - name: Verify PostGIS and HTTP
        run: |
          docker compose --env-file .env.example -f compose.yaml -f compose.dev.yaml exec -T database psql -U family_places -d family_places -c 'SELECT PostGIS_Full_Version();'
          ./scripts/smoke
      - name: Service logs
        if: always()
        run: docker compose --env-file .env.example -f compose.yaml -f compose.dev.yaml logs
      - name: Stop stack
        if: always()
        run: docker compose --env-file .env.example -f compose.yaml -f compose.dev.yaml down --volumes
