name: Integration

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build development runtimes
        run: docker compose --env-file .env.example -f compose.yaml -f compose.dev.yaml build api web
      - name: Install mounted workspace dependencies
        run: |
          docker compose --env-file .env.example -f compose.yaml -f compose.dev.yaml run --rm --no-deps api composer install --no-interaction --prefer-dist
          docker run --rm -u "$(id -u):$(id -g)" -e HOME=/tmp -v "$PWD:/workspace" -w /workspace node:24-bookworm sh -c 'corepack pnpm install --frozen-lockfile && corepack pnpm --filter @family-places/api-client build'
      - name: Start stack
        run: |
          docker compose --env-file .env.example -f compose.yaml -f compose.dev.yaml up --wait -d database
          docker compose --env-file .env.example -f compose.yaml -f compose.dev.yaml run --rm api php bin/console doctrine:migrations:migrate --no-interaction
          docker compose --env-file .env.example -f compose.yaml -f compose.dev.yaml up -d worker
          docker compose --env-file .env.example -f compose.yaml -f compose.dev.yaml up --wait -d api web
      - name: Verify PostGIS and HTTP
        run: |
          docker compose --env-file .env.example -f compose.yaml -f compose.dev.yaml exec -T api php bin/console doctrine:migrations:status
          docker compose --env-file .env.example -f compose.yaml -f compose.dev.yaml exec -T database psql -U family_places -d family_places -c 'SELECT PostGIS_Full_Version();'
          ./scripts/smoke
      - name: Service logs
        if: always()
        run: docker compose --env-file .env.example -f compose.yaml -f compose.dev.yaml logs
      - name: Stop stack
        if: always()
        run: docker compose --env-file .env.example -f compose.yaml -f compose.dev.yaml down --volumes
