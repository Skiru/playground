name: Backend quality

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build PHP 8.5 development runtime
        run: docker build --target development -t family-places-api-ci -f infra/docker/api.Dockerfile .
      - name: Install backend dependencies
        run: docker run --rm -u "$(id -u):$(id -g)" -v "$PWD/apps/api:/app" -w /app family-places-api-ci composer install --no-interaction --prefer-dist
      - name: Validate and lint
        run: |
          docker run --rm -u "$(id -u):$(id -g)" -v "$PWD/apps/api:/app" -w /app family-places-api-ci composer validate --strict
          docker run --rm -u "$(id -u):$(id -g)" -v "$PWD/apps/api:/app" -w /app family-places-api-ci php bin/console lint:container
          docker run --rm -u "$(id -u):$(id -g)" -v "$PWD/apps/api:/app" -w /app family-places-api-ci php bin/console lint:yaml config
      - name: Static and architecture checks
        run: |
          docker run --rm -u "$(id -u):$(id -g)" -v "$PWD/apps/api:/app" -w /app family-places-api-ci vendor/bin/php-cs-fixer check --diff
          docker run --rm -u "$(id -u):$(id -g)" -v "$PWD/apps/api:/app" -w /app family-places-api-ci php bin/console cache:warmup --env=test
          docker run --rm -u "$(id -u):$(id -g)" -v "$PWD/apps/api:/app" -w /app family-places-api-ci vendor/bin/phpstan analyse --no-progress --memory-limit=512M
          docker run --rm -u "$(id -u):$(id -g)" -v "$PWD/apps/api:/app" -w /app family-places-api-ci vendor/bin/deptrac analyse
          API_IMAGE=family-places-api-ci ./scripts/verify-deptrac-boundary
      - name: Backend tests
        run: |
          docker compose -f compose.yaml -f compose.test.yaml run --rm api php bin/console doctrine:database:create --if-not-exists
          docker compose -f compose.yaml -f compose.test.yaml run --rm api php bin/console doctrine:migrations:migrate --no-interaction
          docker compose -f compose.yaml -f compose.test.yaml run --rm api php bin/console doctrine:fixtures:load --no-interaction
          docker compose -f compose.yaml -f compose.test.yaml run --rm api php bin/phpunit tests/Places/Domain tests/Places/Application tests/Identity tests/Discovery/Application tests/Shared
