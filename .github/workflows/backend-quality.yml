name: Backend quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install backend dependencies
        run: docker run --rm -u "$(id -u):$(id -g)" -v "$PWD/apps/api:/app" -w /app composer:2 composer install --no-interaction --prefer-dist
      - name: Validate and lint
        run: |
          docker run --rm -u "$(id -u):$(id -g)" -v "$PWD/apps/api:/app" -w /app composer:2 composer validate --strict
          docker run --rm -u "$(id -u):$(id -g)" -v "$PWD/apps/api:/app" -w /app composer:2 php bin/console lint:container
          docker run --rm -u "$(id -u):$(id -g)" -v "$PWD/apps/api:/app" -w /app composer:2 php bin/console lint:yaml config
      - name: Static and architecture checks
        run: |
          docker run --rm -u "$(id -u):$(id -g)" -v "$PWD/apps/api:/app" -w /app composer:2 vendor/bin/php-cs-fixer check --diff
          docker run --rm -u "$(id -u):$(id -g)" -v "$PWD/apps/api:/app" -w /app composer:2 php bin/console cache:warmup --env=test
          docker run --rm -u "$(id -u):$(id -g)" -v "$PWD/apps/api:/app" -w /app composer:2 vendor/bin/phpstan analyse --no-progress
          docker run --rm -u "$(id -u):$(id -g)" -v "$PWD/apps/api:/app" -w /app composer:2 vendor/bin/deptrac analyse
      - name: Backend tests
        run: docker run --rm -u "$(id -u):$(id -g)" -v "$PWD/apps/api:/app" -w /app composer:2 php bin/phpunit
