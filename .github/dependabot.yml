version: 2
updates:
  - package-ecosystem: composer
    directory: /apps/api
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      safe-composer-updates:
        patterns: ['*']
        update-types: [minor, patch]
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      safe-pnpm-updates:
        patterns: ['*']
        update-types: [minor, patch]
  - package-ecosystem: docker
    directory: /infra/docker
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      actions-updates:
        patterns: ['*']
