security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: auto
    providers:
        admin_users:
            entity:
                class: App\Identity\Domain\User
                property: email
    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: admin_users
            form_login:
                login_path: admin_login
                check_path: admin_login
                enable_csrf: true
                default_target_path: /admin
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'
            logout:
                path: admin_logout
                target: admin_login
    access_control:
        - { path: ^/admin/login$, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_ADMIN }

when@test:
    security:
        providers:
            test_users:
                memory:
                    users:
                        admin@example.test: { password: '$2y$04$1gdB2/YIo.5sVRE7JpMdR.AL2c9cef8DPnEm/4fDHp/syvn/zOTBK', roles: [ROLE_ADMIN] }
        firewalls:
            main:
                provider: test_users
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
