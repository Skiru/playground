doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'
        server_version: '18'
        profiling_collect_backtrace: '%kernel.debug%'
        # Places is intentionally DBAL-managed; ORM schema validation owns Identity only.
        schema_filter: '~^(users|external_identities|doctrine_migration_versions)$~'
        types:
            geography:
                class: Jsor\Doctrine\PostGIS\Types\GeographyType
    orm:
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore
        identity_generation_preferences:
            Doctrine\DBAL\Platforms\PostgreSQLPlatform: identity
        auto_mapping: false
        mappings:
            Identity:
                type: xml
                dir: '%kernel.project_dir%/src/Identity/Infrastructure/Doctrine/Mapping'
                prefix: App\Identity\Domain
                alias: Identity

when@test:
    doctrine:
        dbal:
            # "TEST_TOKEN" is typically set by ParaTest
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
