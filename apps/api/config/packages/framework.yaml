# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'
    default_locale: pl

    # Note that the session will be started ONLY if you read or write from it.
    session:
        name: FAMILYPLACESSESSID
        cookie_httponly: true
        cookie_samesite: lax
        cookie_secure: auto
        cookie_path: /
        gc_maxlifetime: 86400

    rate_limiter:
        place_search:
            policy: token_bucket
            limit: 60
            rate: { interval: '1 minute', amount: 60 }
        map_places:
            policy: token_bucket
            limit: 30
            rate: { interval: '1 minute', amount: 30 }
        google_login:
            policy: token_bucket
            limit: 5
            rate: { interval: '1 minute', amount: 5 }
        review_write:
            policy: token_bucket
            limit: '%env(int:LIMIT_REVIEW_WRITE)%'
            rate: { interval: '1 minute', amount: '%env(int:LIMIT_REVIEW_WRITE)%' }
        comment_write:
            policy: token_bucket
            limit: '%env(int:LIMIT_COMMENT_WRITE)%'
            rate: { interval: '1 minute', amount: '%env(int:LIMIT_COMMENT_WRITE)%' }
        forum_thread_write:
            policy: token_bucket
            limit: '%env(int:LIMIT_FORUM_THREAD_WRITE)%'
            rate: { interval: '1 minute', amount: '%env(int:LIMIT_FORUM_THREAD_WRITE)%' }
        forum_post_write:
            policy: token_bucket
            limit: '%env(int:LIMIT_FORUM_POST_WRITE)%'
            rate: { interval: '1 minute', amount: '%env(int:LIMIT_FORUM_POST_WRITE)%' }
        report_write:
            policy: token_bucket
            limit: '%env(int:LIMIT_REPORT_WRITE)%'
            rate: { interval: '1 minute', amount: '%env(int:LIMIT_REPORT_WRITE)%' }
        moderator_write:
            policy: token_bucket
            limit: '%env(int:LIMIT_MODERATOR_WRITE)%'
            rate: { interval: '1 minute', amount: '%env(int:LIMIT_MODERATOR_WRITE)%' }

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
