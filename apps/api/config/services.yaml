# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    env(DEV_AUTH_ENABLED): '0'
    env(STORAGE_DRIVER): 'local'
    env(STORAGE_BASE_URL): '/uploads'
    env(STORAGE_LOCAL_DIR): '/data/familyplaces-media'
    env(MEDIA_PUBLIC_BASE_URL): 'http://localhost:8080/media'
    env(STORAGE_S3_ENDPOINT): ''
    env(STORAGE_S3_KEY): ''
    env(STORAGE_S3_SECRET): ''
    env(STORAGE_S3_BUCKET): ''
    env(STORAGE_S3_REGION): 'us-east-1'
    env(STORAGE_S3_PUBLIC_URL): ''
    env(MEDIA_E2E_MODE): 'false'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    App\Administration\Infrastructure\EasyAdmin\DashboardController:
        public: true
        autowire: true

    App\Shared\Application\:
        resource: '../src/Shared/Application/'

    App\Shared\Infrastructure\:
        resource: '../src/Shared/Infrastructure/'

    App\Identity\Application\:
        resource: '../src/Identity/Application/'

    App\Identity\Infrastructure\:
        resource: '../src/Identity/Infrastructure/'

    App\Identity\UI\:
        resource: '../src/Identity/UI/'

    App\Personalization\Application\:
        resource: '../src/Personalization/Application/'

    App\Personalization\Infrastructure\:
        resource: '../src/Personalization/Infrastructure/'

    App\Personalization\UI\:
        resource: '../src/Personalization/UI/'

    App\Places\Application\:
        resource: '../src/Places/Application/'

    App\Places\Infrastructure\:
        resource: '../src/Places/Infrastructure/'

    App\Places\UI\:
        resource: '../src/Places/UI/'

    App\Discovery\Application\:
        resource: '../src/Discovery/Application/'

    App\Discovery\Infrastructure\:
        resource: '../src/Discovery/Infrastructure/'

    App\Discovery\UI\:
        resource: '../src/Discovery/UI/'

    App\Administration\Infrastructure\:
        resource: '../src/Administration/Infrastructure/'

    App\Administration\UI\:
        resource: '../src/Administration/UI/'

    App\Shared\Application\Clock:
        alias: App\Shared\Infrastructure\Clock\SystemClock
        public: true

    App\Shared\Application\TransactionManager: '@App\Shared\Infrastructure\Doctrine\DbalTransactionManager'

    App\Shared\Infrastructure\Logging\CorrelationIdProcessor:
        tags: [monolog.processor]

    App\Identity\Application\UserRepository: '@App\Identity\Infrastructure\Doctrine\UserRepository'
    App\Identity\Application\ExternalIdentityRepository: '@App\Identity\Infrastructure\Doctrine\ExternalIdentityRepository'
    App\Identity\Application\Google\GoogleIdentityVerifier: '@App\Identity\Infrastructure\Google\GoogleApiClientIdentityVerifier'

    App\Personalization\Application\FavoriteRepository: '@App\Personalization\Infrastructure\Doctrine\FavoriteRepository'
    App\Personalization\Application\VisitRepository: '@App\Personalization\Infrastructure\Doctrine\VisitRepository'
    App\Personalization\Domain\PublishedPlaceLookup: '@App\Personalization\Infrastructure\PublishedPlaceDbalLookup'

    App\Identity\Infrastructure\Google\GoogleApiClientIdentityVerifier:
        arguments:
            $clientId: '%env(resolve:GOOGLE_CLIENT_ID)%'

    App\Places\Application\PlaceRepository: '@App\Places\Infrastructure\Doctrine\PlaceRepository'
    App\Discovery\Application\PlaceReadModel: '@App\Discovery\Infrastructure\Doctrine\PlaceReadRepository'

    # Storage Configuration
    App\Shared\Infrastructure\Storage\LocalStorageAdapter:
        arguments:
            $storageDir: '%env(resolve:STORAGE_LOCAL_DIR)%'
            $baseUrl: '%env(resolve:MEDIA_PUBLIC_BASE_URL)%'

    App\Shared\Infrastructure\Storage\S3StorageAdapter:
        arguments:
            $endpoint: '%env(STORAGE_S3_ENDPOINT)%'
            $key: '%env(STORAGE_S3_KEY)%'
            $secret: '%env(STORAGE_S3_SECRET)%'
            $bucket: '%env(STORAGE_S3_BUCKET)%'
            $region: '%env(STORAGE_S3_REGION)%'
            $publicUrl: '%env(STORAGE_S3_PUBLIC_URL)%'

    App\Shared\Application\Storage\StorageInterface: '@App\Shared\Infrastructure\Storage\StorageService'
    App\Shared\Application\Storage\ImageProcessor: '@App\Shared\Infrastructure\Storage\GdImageProcessor'

    Jsor\Doctrine\PostGIS\Event\ORMSchemaEventListener:
        tags: [{ name: doctrine.event_listener, event: postGenerateSchemaTable, connection: default }]

    Jsor\Doctrine\PostGIS\Driver\Middleware:
        tags: [doctrine.middleware]
