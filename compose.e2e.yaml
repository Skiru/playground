services:
  api:
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
      APP_SECRET: deterministic-e2e-secret
      DATABASE_URL: postgresql://family_places_test:family_places_test@database:5432/family_places_test?serverVersion=18&charset=utf8
      GOOGLE_CLIENT_ID: ${PUBLIC_GOOGLE_CLIENT_ID:-}
      DEV_AUTH_ENABLED: "true"
      MEDIA_E2E_MODE: "true"
      MEDIA_PUBLIC_BASE_URL: http://127.0.0.1:8080/media
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - media-data:/data/familyplaces-media
  worker:
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
      APP_SECRET: deterministic-e2e-secret
      DATABASE_URL: postgresql://family_places_test:family_places_test@database:5432/family_places_test?serverVersion=18&charset=utf8
      MEDIA_E2E_MODE: "true"
      MEDIA_PUBLIC_BASE_URL: http://127.0.0.1:8080/media
    volumes:
      - media-data:/data/familyplaces-media
  web:
    environment:
      NODE_ENV: production
      API_BASE_URL: http://api
      MAP_STYLE_URL: http://127.0.0.1:3000/fixtures/map-style.json
      MAP_ATTRIBUTION: FamilyPlaces deterministic CI map
      MAP_PROVIDER_NAME: FamilyPlaces CI fixture
      GOOGLE_IDENTITY_ENABLED: ${GOOGLE_IDENTITY_ENABLED:-false}
      PUBLIC_GOOGLE_CLIENT_ID: ${PUBLIC_GOOGLE_CLIENT_ID:-}
      DEV_AUTH_ENABLED: ${DEV_AUTH_ENABLED:-true}
      E2E: "true"
      APP_ENV: prod
    ports:
      - "127.0.0.1:3000:3000"
  database:
    environment:
      POSTGRES_DB: family_places_test
      POSTGRES_USER: family_places_test
      POSTGRES_PASSWORD: family_places_test
    volumes:
      - database-test-data:/var/lib/postgresql

volumes:
  database-test-data:
