services:
  api:
    image: family-places-api:sha-2338908d630973138a6d9fd27d2ae8d758ba6d50
    restart: unless-stopped
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
      APP_SECRET: ${APP_SECRET:?APP_SECRET is required in production}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required in production}
  worker:
    image: family-places-worker:sha-2338908d630973138a6d9fd27d2ae8d758ba6d50
    restart: unless-stopped
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
      APP_SECRET: ${APP_SECRET:?APP_SECRET is required in production}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required in production}
  web:
    image: family-places-web:sha-2338908d630973138a6d9fd27d2ae8d758ba6d50
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MAP_STYLE_URL: ${MAP_STYLE_URL:?MAP_STYLE_URL is required in production}
      MAP_ATTRIBUTION: ${MAP_ATTRIBUTION:?MAP_ATTRIBUTION is required in production}
      MAP_PROVIDER_NAME: ${MAP_PROVIDER_NAME:?MAP_PROVIDER_NAME is required in production}
  database:
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required in production}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required in production}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in production}
