services:
  api:
    restart: unless-stopped
    environment:
      APP_SECRET: ${APP_SECRET:?APP_SECRET is required in production}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required in production}
  worker:
    restart: unless-stopped
  web:
    restart: unless-stopped
    environment:
      MAP_STYLE_URL: ${MAP_STYLE_URL:?MAP_STYLE_URL is required in production}
      MAP_ATTRIBUTION: ${MAP_ATTRIBUTION:?MAP_ATTRIBUTION is required in production}
      MAP_PROVIDER_NAME: ${MAP_PROVIDER_NAME:?MAP_PROVIDER_NAME is required in production}
  database:
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in production}
