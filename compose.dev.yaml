services:
  api:
    build:
      target: development
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      APP_SECRET: ${APP_SECRET:-local-development-only-secret}
      DATABASE_URL: ${DATABASE_URL:-postgresql://family_places:family_places@database:5432/family_places?serverVersion=18&charset=utf8}
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./apps/api:/app
  worker:
    build:
      target: development
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      APP_SECRET: ${APP_SECRET:-local-development-only-secret}
      DATABASE_URL: ${DATABASE_URL:-postgresql://family_places:family_places@database:5432/family_places?serverVersion=18&charset=utf8}
      MESSENGER_TRANSPORT_DSN: in-memory://
    volumes:
      - ./apps/api:/app
  web:
    build:
      target: development
    command: ["pnpm", "--filter", "@family-places/web", "dev", "--host", "0.0.0.0", "--port", "3000"]
    environment:
      NODE_ENV: development
      MAP_STYLE_URL: ${MAP_STYLE_URL:-https://demotiles.maplibre.org/style.json}
      MAP_ATTRIBUTION: ${MAP_ATTRIBUTION:-MapLibre demonstration tiles (development only)}
      MAP_PROVIDER_NAME: ${MAP_PROVIDER_NAME:-MapLibre Demo Tiles (development only)}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - .:/workspace
      - pnpm-store:/pnpm/store
  database:
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-family_places}
      POSTGRES_USER: ${POSTGRES_USER:-family_places}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-family_places}
    ports:
      - "127.0.0.1:5432:5432"
  mailpit:
    image: axllent/mailpit:v1.27
    ports:
      - "127.0.0.1:8025:8025"
    networks: [edge, internal]
