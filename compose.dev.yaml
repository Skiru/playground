services:
  api:
    build:
      target: development
    environment:
      APP_ENV: dev
    volumes:
      - ./apps/api:/app
  worker:
    build:
      target: development
    environment:
      APP_ENV: dev
      MESSENGER_TRANSPORT_DSN: in-memory://
    volumes:
      - ./apps/api:/app
  web:
    build:
      target: development
    command: ["pnpm", "--filter", "@family-places/web", "dev", "--host", "0.0.0.0", "--port", "3000"]
    environment:
      NODE_ENV: development
    volumes:
      - .:/workspace
      - pnpm-store:/pnpm/store
  database:
    ports:
      - "127.0.0.1:5432:5432"
